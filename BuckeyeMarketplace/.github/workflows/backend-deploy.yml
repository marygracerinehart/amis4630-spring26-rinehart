name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore backend/BuckeyeMarketplaceAPI/BuckeyeMarketplaceAPI.csproj
    
    - name: Build backend
      run: dotnet build backend/BuckeyeMarketplaceAPI/BuckeyeMarketplaceAPI.csproj --configuration Release --no-restore
    
    - name: Run backend tests
      run: dotnet test backend/BuckeyeMarketplaceAPI.Tests/BuckeyeMarketplaceAPI.Tests.csproj --configuration Release --no-build --verbosity normal
      continue-on-error: true
    
    - name: Publish backend
      run: dotnet publish backend/BuckeyeMarketplaceAPI/BuckeyeMarketplaceAPI.csproj -c Release -o backend/publish

  deploy-to-azure:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'
    
    - name: Build for deployment
      run: |
        cd backend/BuckeyeMarketplaceAPI
        dotnet publish -c Release -o ../publish-release
    
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ndw38rn3iu'
        publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
        package: backend/publish-release
